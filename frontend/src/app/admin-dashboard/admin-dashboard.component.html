<div class="container mt-5 fade-in">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2>Administratorski Panel</h2>
    <button class="btn btn-outline-danger" (click)="odjaviSe()">Odjavi se</button>
  </div>

  <div class="row text-center mt-5">
    <div class="col-md-3 mb-4">
      <div class="card shadow-sm p-4 h-100" style="cursor: pointer" routerLink="/admin-korisnici">
        <h4><i class="bi bi-people-fill text-primary"></i></h4>
        <h5>Upravljanje korisnicima</h5>
      </div>
    </div>
    <div class="col-md-3 mb-4">
      <div class="card shadow-sm p-4 h-100" style="cursor: pointer" routerLink="/admin-zahtevi">
        <h4><i class="bi bi-check-circle-fill text-success"></i></h4>
        <h5>Zahtevi (Registracija/Objekti)</h5>
      </div>
    </div>
    <div class="col-md-3 mb-4">
      <div class="card shadow-sm p-4 h-100" style="cursor: pointer" routerLink="/admin-treneri">
        <h4><i class="bi bi-person-badge-fill text-info"></i></h4>
        <h5>Evidencija trenera</h5>
      </div>
    </div>
    <div class="col-md-3 mb-4">
      <div class="card shadow-sm p-4 h-100" style="cursor: pointer" routerLink="/admin-sportovi">
        <h4><i class="bi bi-dribbble text-warning"></i></h4>
        <h5>Vrste sportova</h5>
      </div>
    </div>
  </div>
</div>
