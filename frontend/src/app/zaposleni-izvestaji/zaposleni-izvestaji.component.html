<div class="container mt-5 fade-in">
  <h2>Generisanje Izveštaja</h2>
  
  <div class="card p-4 shadow-sm mt-4">
    <div class="row">
      <div class="col-md-4 mb-3">
        <label class="form-label fw-bold">Mesec:</label>
        <select class="form-select" [(ngModel)]="izabranMesec">
          <option *ngFor="let m of meseci" [value]="m.vrednost">{{m.naziv}}</option>
        </select>
      </div>
      <div class="col-md-4 mb-3">
        <label class="form-label fw-bold">Godina:</label>
        <input type="number" class="form-control" [(ngModel)]="izabranaGodina">
      </div>
      <div class="col-md-4 mb-3">
        <label class="form-label fw-bold">Objekat (za prvi izveštaj):</label>
        <select class="form-select" [(ngModel)]="izabranObjekat">
          <option *ngFor="let o of objekti" [value]="o.id">{{o.naziv}}</option>
        </select>
      </div>
    </div>

    <div class="d-flex gap-3 mt-4">
      <button class="btn btn-primary" (click)="generisiIzvestajPopunjenosti()">
        <i class="bi bi-file-earmark-pdf me-2"></i> Preuzmi PDF - Popunjenost terena
      </button>
      <button class="btn btn-success" (click)="generisiIzvestajOpreme()">
        <i class="bi bi-file-earmark-pdf me-2"></i> Preuzmi PDF - Promet opreme
      </button>
    </div>
  </div>
</div>
