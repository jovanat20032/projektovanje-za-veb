<h2>Registracija novog korisnika</h2>
<hr />
<form>
    <table>
        <tr>
            <td>Korisnicko ime:</td>
            <td>
                <input type='text' name='korisnickoIme' [(ngModel)]='noviKorisnik.korisnickoIme'>
            </td>
        </tr>
        <tr>
            <td>Lozinka:</td>
            <td>
                <input type='password' name='lozinka' [(ngModel)]='noviKorisnik.lozinka'>
            </td>
        </tr>
        <tr>
            <td>Ime:</td>
            <td>
                <input type='text' name='ime' [(ngModel)]='noviKorisnik.ime'>
            </td>
        </tr>
        <tr>
            <td>Prezime:</td>
            <td>
                <input type='text' name='prezime' [(ngModel)]='noviKorisnik.prezime'>
            </td>
        </tr>
        <tr>
            <td>Telefon:</td>
            <td>
                <input type='text' name='telefon' [(ngModel)]='noviKorisnik.telefon'>
            </td>
        </tr>
        <tr>
            <td>Email adresa:</td>
            <td>
                <input type='email' name='email' [(ngModel)]='noviKorisnik.email'>
            </td>
        </tr>
        <tr>
            <td>Izaberite ulogu:</td>
            <td>
                <select name="uloga" [(ngModel)]="noviKorisnik.uloga">
                    <option value="" disabled selected>-- Odaberi ulogu --</option>
                    <option value="SPORTISTA">Sportista (Korisnik)</option>
                    <option value="ZAPOSLENI">Zaposleni u objektu</option>
                </select>
            </td>
        </tr>
        <tr>
            <td colspan='2'>
                <input type='button' value='Posalji zahtev' (click)='registrujSe()'>
            </td>
        </tr>
    </table>
</form>

<span style="color: red">{{poruka}}</span>
<br><br>
<a routerLink="/prijava">Vec imate nalog? Prijavite se ovde.</a>
