<h2>Postavljanje nove lozinke</h2>
<hr />

<table>
    <tr>
        <td>Nova lozinka:</td>
        <td><input type="password" [(ngModel)]="novaLozinka"></td>
    </tr>
    <tr>
        <td>Potvrdite lozinku:</td>
        <td><input type="password" [(ngModel)]="potvrdaLozinke"></td>
    </tr>
    <tr>
        <td colspan="2">
            <button (click)="promeniLozinku()">Sačuvaj lozinku</button>
        </td>
    </tr>
</table>

<span style="color: red">{{ poruka }}</span>
