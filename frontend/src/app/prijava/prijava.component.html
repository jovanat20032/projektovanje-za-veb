<div class="form-container">
  <h2>Prijava na sistem</h2>
  <hr />
  <form #prijavaForm="ngForm" (ngSubmit)="prijavaNaSistem()">
      <div class="form-group">
          <label for="korisnickoIme">Korisničko ime:</label>
          <input type="text" id="korisnickoIme" name="korisnickoIme" class="form-control"
                 [(ngModel)]="korisnickoIme" required #korisnickoImeInput="ngModel">
          <span class="text-danger" *ngIf="korisnickoImeInput.invalid && (korisnickoImeInput.dirty || korisnickoImeInput.touched)">
              Korisničko ime je obavezno.
          </span>
      </div>
      
      <div class="form-group">
          <label for="lozinka">Lozinka:</label>
          <input type="password" id="lozinka" name="lozinka" class="form-control"
                 [(ngModel)]="lozinka" required minlength="6" #lozinkaInput="ngModel">
          <span class="text-danger" *ngIf="lozinkaInput.invalid && (lozinkaInput.dirty || lozinkaInput.touched)">
              <span *ngIf="lozinkaInput.errors?.['required']">Lozinka je obavezna.</span>
              <span *ngIf="lozinkaInput.errors?.['minlength']">Lozinka mora imati barem 6 karaktera.</span>
          </span>
      </div>
      
      <div class="form-group">
          <button type="submit" class="btn btn-primary" [disabled]="prijavaForm.invalid">Prijava</button>
      </div>
      
      <span class="text-danger" *ngIf="poruka">{{poruka}}</span>
      
      <hr>
      <p>Nemate nalog? <button type="button" class="btn btn-secondary btn-sm" (click)="registracija()">Registracija</button></p>
      <p>Zaboravili ste lozinku? <button type="button" class="btn btn-secondary btn-sm" (click)="zaboravljena()">Zaboravljena lozinka</button></p>
  </form>
</div>
