<div class="container mt-5">
  <div class="mb-3">
    <a routerLink="/admin-dashboard" class="btn btn-secondary">&larr; Nazad na panel</a>
  </div>
  
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card shadow mt-4 border-warning">
        <div class="card-header bg-warning text-dark">
          <h4 class="mb-0">Dodaj novu vrstu sporta</h4>
        </div>
        <div class="card-body p-4">
          <form (ngSubmit)="dodajSport()">
            <div class="mb-3">
              <label class="form-label fw-bold">Naziv sporta:</label>
              <input type="text" class="form-control" name="naziv" [(ngModel)]="naziv" placeholder="Unesite naziv sporta (npr. Vaterpolo)" required>
            </div>
            
            <div class="form-check mb-4">
              <input class="form-check-input" type="checkbox" id="timskiCheck" name="timski" [(ngModel)]="timski">
              <label class="form-check-label" for="timskiCheck">
                Da li je sport timski?
              </label>
            </div>
            
            <button type="submit" class="btn btn-warning w-100 fw-bold">Dodaj sport</button>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
